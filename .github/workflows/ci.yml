name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.24', '1.25']
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
      - name: Build
        run: go build ./cmd/liteschema/
      - name: Vet
        run: go vet ./... 2>&1 || echo "vet warnings (non-blocking)"
      - name: Test
        run: go test ./... -v -count=1